server {
    listen 80;
    listen [::]:80;
    server_name wavesjyvaskyla.fi www.wavesjyvaskyla.fi;
    root /var/www/wavesjyvaskyla;
    index index.php index.html;
    client_max_body_size 24M;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /(data|admin/includes)/ {
        deny all;
        return 403;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|avif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/wavesjyvaskyla_access.log;
    error_log /var/log/nginx/wavesjyvaskyla_error.log;
}
